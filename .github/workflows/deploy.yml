name: Deploy to Cloudflare Pages

# Production deploys ONLY from main (after CI passes).
# PRs get a preview deployment on a pr-<number> branch alias.
# Requires repo secrets: CLOUDFLARE_API_TOKEN (Pages Edit), CLOUDFLARE_ACCOUNT_ID.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Full quality gate — MUST match ci.yml exactly so Production can never deploy
  # on a tree that CI would reject. Job name is unique (preflight) to avoid
  # colliding with ci.yml's `verify-ci` required status check.
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: py_compile all tools
        run: python -m py_compile tools/*.py
      - name: regression tests
        run: python -m unittest discover -s tests -v
      - name: independent candidate verification
        run: python tools/codex_verify_queue.py
      - name: verify-all quality gate
        run: python tools/tmc_ops.py verify-all --json verify-report.json
      - name: workspace data contract (Codex gate)
        run: python tools/workspace_validate.py
      - name: workspace pages built & idempotent
        run: python tools/workspace_build.py --check

  deploy:
    needs: preflight
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.head.repo.fork }}
    steps:
      - uses: actions/checkout@v4
      - name: Guard — secrets must exist
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCOUNT" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID secrets"; exit 1
          fi
      - name: Deploy (preview for PR, production for main)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy site --project-name=tradingmapclaw
            --branch=${{ github.event_name == 'push' && 'main' || format('pr-{0}', github.event.number) }}
            --commit-dirty=true
      - name: Smoke test production
        if: github.event_name == 'push'
        run: |
          sleep 20
          for path in / /products /radar /story /faq /workspace/ /workspace/assets/nvda/ /sitemap.xml /llms.txt /api/health; do
            code=$(curl -sL -o /dev/null -w "%{http_code}" "https://www.tradingmapclaw.com${path}")
            echo "$code  $path"
            [ "$code" = "200" ] || { echo "::error::smoke test failed on ${path}"; exit 1; }
          done
          curl -s https://www.tradingmapclaw.com/ | grep -q "Dual-Engine" || { echo "::error::homepage content check failed"; exit 1; }
          curl -s https://www.tradingmapclaw.com/workspace/assets/nvda/ | grep -q "STATUS: LIVE" || { echo "::error::workspace NVDA is not LIVE"; exit 1; }
