name: CI — verify-all quality gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: py_compile all tools
        run: python -m py_compile tools/*.py
      - name: verify-all quality gate
        run: python tools/tmc_ops.py verify-all --json verify-report.json
      - name: Upload verify report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-report
          path: verify-report.json
